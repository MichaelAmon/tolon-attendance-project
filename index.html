<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proodent Attendance</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Proodent Attendance</h1>
    <p id="status">Checking location...</p>
    <p id="location">Location: Loading...</p>
    <input type="tel" id="phone" placeholder="Enter your phone (e.g., +233247877745)" required>
    <button id="clockIn" disabled>Clock In</button>
    <button id="clockOut" disabled>Clock Out</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
